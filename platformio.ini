; ── Common ESP32-S3 settings (shared by all board environments) ───────────────
[base_incunest_esp32s3]
platform = espressif32@6.6.0
framework = arduino
board = esp32-s3-devkitc-1
board_build.partitions = ESP32S3_OTA_partition_8MB.csv
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
monitor_speed = 921600
monitor_filters = esp32_exception_decoder
build_type = debug
debug_tool = esp-prog
debug_init_break = tbreak setup
extra_scripts = pre:scripts/pre_build_hash.py
; ── Library: incunest_afe4490 ─────────────────────────────────────────────────
; The library must be placed in lib/incunest_afe4490. Two options:
;
;   OPTION A — Symlink (for library developers):
;     Use this if you also work on incunest_afe4490 itself. PlatformIO reads
;     directly from the library repo — changes are visible on the next build
;     without copying anything.
;     Requires the library repo cloned at C:\PRJ\MOW\incunest_afe4490.
;     To create the symlink on Windows (run as Administrator, adapt paths to your machine):
;       mklink /D "C:\PRJ\MOW\PulseNest\lib\incunest_afe4490" "C:\PRJ\MOW\incunest_afe4490"
;
;   OPTION B — Direct copy (for library users):
;     Use this if you only build PulseNest and do not modify the library.
;     No symlink or Administrator rights needed. Changes to the library
;     repo are NOT reflected automatically — clone again to update.
;       git clone https://github.com/medicalopenworld/incunest_afe4490.git lib/incunest_afe4490
;
; If lib/incunest_afe4490 is absent the build will fail (library not found).
;
build_flags =
    -DCORE_DEBUG_LEVEL=5          ; ESP32 Arduino: maximum debug level
    -g3                           ; maximum debug info
    -O2                           ; optimization level 2
    -DSPI_FREQUENCY=27000000
    -DINCUNEST_TIMING_STATS=1     ; per-algorithm timing instrumentation ($TIMING serial frame)
    ; -DINCUNEST_DEBUG            ; optional: custom debug macro
    ; -Wno-attributes             ; optional: suppress 'packed' warnings
    ; -Wno-return-type            ; NOT recommended: suppresses useful warnings
    ; ── SPI bus pins (same on all current boards) ─────────────────────────────
    -DSPI_SCK_PIN=36
    -DSPI_MISO_PIN=37
    -DSPI_MOSI_PIN=35
    ; ── Other pins shared across boards ──────────────────────────────────────
    -DAFE4490_CS_PIN=21
    -DAFE4490_PWDN_PIN=0

; ── Board: Incunest V15 ───────────────────────────────────────────────────────
[env:incunest_V15]
extends = base_incunest_esp32s3
build_flags =
    ${base_incunest_esp32s3.build_flags}
    -DAFE4490_DRDY_PIN=45
    -DBOARD_VERSION=\"incunest_V15\"

; ── Board: Incunest V16 ───────────────────────────────────────────────────────
[env:incunest_V16]
extends = base_incunest_esp32s3
build_flags =
    ${base_incunest_esp32s3.build_flags}
    -DAFE4490_DRDY_PIN=17
    -DBOARD_VERSION=\"incunest_V16\"

[env:native]
platform = native
test_framework = unity
build_src_filter = -<*>
build_flags =
    -DUNIT_TEST
    -I test/stubs

