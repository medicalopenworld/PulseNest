[env:in3ator_V15]
build_flags =
    -DCORE_DEBUG_LEVEL=5     ; ESP32 Arduino specific: Set to the maximum debug level
    -g3                      ; Generate maximum debugging information
    -O2                      ; Optimization level 2 — measuring real production performance
    -DSPI_FREQUENCY=27000000
    -DMOW_TIMING_STATS=1     ; Enable per-algorithm timing instrumentation ($TIMING serial frame)
    
    ; -DIN3_DEBUG           ; <-- si quieres tu propio macro
    ; -Wno-attributes       ; <-- opcional, solo si quieres silenciar 'packed'
    ; -Wno-return-type      ; <-- NO recomendado, silencia avisos útiles

platform = espressif32@6.6.0
framework = arduino
board = esp32-s3-devkitc-1
board_build.partitions = ESP32S3_OTA_partition_8MB.csv
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
monitor_speed = 921600
monitor_filters = esp32_exception_decoder
build_type = debug
debug_tool = esp-prog
debug_init_break = tbreak setup

lib_deps =
  https://github.com/Protocentral/protocentral-afe4490-arduino.git

[env:native]
platform = native
test_framework = unity
build_src_filter = -<*>
build_flags =
    -DUNIT_TEST
    -I test/stubs

